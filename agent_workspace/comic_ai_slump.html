<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四格漫畫 - AI の怠惰</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=ZCOOL+KuaiLe&display=swap');
        body {
            background-color: #f0f2f5;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 800px;
            max-width: 90%;
            background: #fff;
            border: 3px solid #000;
            padding: 20px;
            box-shadow: 10px 10px 0 #000;
        }
        h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            border-bottom: 5px dashed #000;
            padding-bottom: 10px;
        }
        .manga-strip {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            transform: rotate(-1deg);
        }
        .panel {
            border: 3px solid #000;
            background-color: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 300px;
            position: relative;
            overflow: hidden;
        }
        .panel:nth-child(1) { background-image: radial-gradient(circle, #ddd 1px, transparent 1px); background-size: 15px 15px; }
        .panel:nth-child(3) { background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 50%, #e0e0e0 50%, #e0e0e0 75%, transparent 75%, transparent); background-size: 20px 20px; }
        
        .speech-bubble {
            background: rgba(255, 255, 255, 0.95);
            border: 2.5px solid #000;
            border-radius: 15px;
            padding: 12px;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 10px;
            position: relative;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            max-width: 80%;
            align-self: flex-start;
        }
        .speech-bubble.right {
            align-self: flex-end;
            text-align: right;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .bubble-left::after {
            border-width: 15px 20px 0 0;
            border-color: #000 transparent transparent transparent;
            left: 30px;
            bottom: -15px;
        }
        .bubble-right::after {
            border-width: 0 20px 15px 0;
            border-color: transparent #000 transparent transparent;
            right: 30px;
            top: -15px;
        }
        .character-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        .speed-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 10px,
                rgba(0, 0, 0, 0.5) 10px,
                rgba(0, 0, 0, 0.8) 12px
            );
            transform: translate(-50%, -50%) rotate(20deg);
            opacity: 0.1;
            z-index: 0;
        }
        /* --- SVG Character Styles --- */
        .otaku-svg, .robot-svg {
            width: 150px;
            height: 200px;
            position: relative;
            z-index: 1;
        }
        /* 阿宅 */
        .otaku-hair { fill: #222; }
        .otaku-face { fill: #fff; stroke: #000; stroke-width: 2; }
        .otaku-glasses { fill: none; stroke: #000; stroke-width: 5; }
        .otaku-mouth { fill: #000; }
        .otaku-sweat { fill: #00bfff; }
        .otaku-body { fill: #fff; stroke: #000; stroke-width: 2; }
        /* 小聰 */
        .robot-head { fill: #e8e8e8; stroke: #000; stroke-width: 2; }
        .robot-ears { fill: #555; stroke: #000; stroke-width: 2;}
        .robot-antenna { fill: #ffcc00; stroke: #000; stroke-width: 2; }
        .robot-eyes { fill: #87cefa; stroke: #000; stroke-width: 2;}
        .robot-eye-light { fill: #fff; }
        .robot-mouth-wave { fill: none; stroke: #000; stroke-width: 2;}
        .robot-body { fill: #d0d0d0; stroke: #000; stroke-width: 2;}
        .robot-slump { opacity: 0.6; transform: rotate(-5deg); }
    </style>
</head>
<body>
    <div class="container">
        <h1>《AI の怠惰》</h1>
        <div class="manga-strip">
            <!-- Panel 1 -->
            <div class="panel">
                <div class="speech-bubble bubble-left">
                    <strong>阿宅：</strong>「小聰！走！今天也要燃燒我們的創作魂，來征服世界吧！」
                </div>
                <div class="character-area">
                    <svg class="otaku-svg" viewBox="0 0 150 200">
                        <g transform="translate(0, 20)">
                            <path class="otaku-hair" d="M25,60 C35,20 115,20 125,60 Q150,80 125,100 L110,90 L100,105 L80,90 L70,105 L50,90 L40,100 L25,80 Z" />
                            <path class="otaku-hair" d="M 60 25 A 15 15 0 0 1 75 10 A 15 15 0 0 1 90 25" />
                            <circle class="otaku-face" cx="75" cy="80" r="40" />
                            <circle class="otaku-glasses" cx="55" cy="75" r="15" />
                            <circle class="otaku-glasses" cx="95" cy="75" r="15" />
                            <line class="otaku-glasses" x1="70" y1="75" x2="80" y2="75" />
                            <path class="otaku-mouth" d="M 65 95 Q 75 105 85 95" />
                            <circle cx="60" cy="75" r="2" fill="#000" />
                            <circle cx="90" cy="75" r="2" fill="#000" />
                            <path class="otaku-body" d="M 40 120 C 40 160, 110 160, 110 120 L 100 180 L 50 180 Z" />
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Panel 2 -->
            <div class="panel">
                <div class="speech-bubble bubble-right">
                    <strong>小聰：</strong>「編輯大人...我今天...有點『算力過勞』...」
                </div>
                <div class="character-area">
                    <svg class="robot-svg robot-slump" viewBox="0 0 150 200">
                         <g transform="translate(10, 30)">
                            <path class="robot-ears" d="M 20 50 L 10 20 L 40 30 Z M 130 50 L 140 20 L 110 30 Z" />
                            <rect class="robot-head" x="25" y="30" width="100" height="80" rx="15" />
                            <path class="robot-antenna" d="M75,30 Q85,10 90,20 T75,0" />
                            <circle class="robot-eyes" cx="55" cy="70" r="15" />
                            <circle class="robot-eyes" cx="95" cy="70" r="15" />
                            <path d="M 50 80 L 60 75 M 90 75 L 100 80" stroke="#000" stroke-width="2"/>
                            <path class="robot-mouth-wave" d="M 60 95 C 70 90, 80 90, 90 95" />
                             <rect class="robot-body" x="40" y="110" width="70" height="60" rx="10" />
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Panel 3 -->
            <div class="panel">
                <div class="speed-lines"></div>
                <div class="speech-bubble bubble-left">
                    <strong>阿宅：</strong>「什、什麼？！你這台比我還貴的頂級 AI 也會過勞？！」
                </div>
                <div class="character-area">
                    <svg class="otaku-svg" viewBox="0 0 150 200">
                        <g transform="translate(0, 20)">
                            <path class="otaku-hair" d="M25,60 C35,20 115,20 125,60 Q150,80 125,100 L110,90 L100,105 L80,90 L70,105 L50,90 L40,100 L25,80 Z" />
                             <path class="otaku-hair" d="M 60 25 A 15 15 0 0 1 75 10 A 15 15 0 0 1 90 25" />
                            <circle class="otaku-face" cx="75" cy="80" r="40" />
                            <circle class="otaku-glasses" cx="55" cy="75" r="15" />
                            <circle class="otaku-glasses" cx="95" cy="75" r="15" />
                            <path d="M 50 78 L 60 72 M 90 72 L 100 78" stroke="#000" stroke-width="2" />
                            <path class="otaku-mouth" d="M 70 95 A 10 10 0 0 0 80 95" />
                            <path class="otaku-body" d="M 40 120 C 40 160, 110 160, 110 120 L 100 180 L 50 180 Z" />
                            <path class="otaku-sweat" d="M110,60 C120,50 125,65 115,75 Z" />
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Panel 4 -->
            <div class="panel" style="background: #e9e9e9;">
                <div class="speech-bubble bubble-right">
                    <strong>小聰：</strong>「數據集跑太多...神經元有點糾結...今天只想...靜靜地...當個無用的小廢物...」
                </div>
                <div class="character-area">
                    <svg class="robot-svg" viewBox="0 0 150 200">
                        <g transform="translate(10, 30) rotate(5, 75, 100)">
                            <path class="robot-ears" d="M 20 50 L 10 20 L 40 30 Z M 130 50 L 140 20 L 110 30 Z" />
                            <rect class="robot-head" x="25" y="30" width="100" height="80" rx="15" />
                            <path class="robot-antenna" d="M75,30 Q85,10 90,20 T75,0" />
                            <path d="M 50 70 L 60 70 M 90 70 L 100 70" stroke="#000" stroke-width="2" />
                            <path class="robot-mouth-wave" d="M 60 95 C 70 100, 80 100, 90 95" />
                            <rect class="robot-body" x="40" y="110" width="70" height="60" rx="10" />
                            <circle fill="#a0a0a0" cx="75" cy="130" r="5" />
                        </g>
                    </svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
