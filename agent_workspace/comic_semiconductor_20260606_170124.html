<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyClaw 四格漫畫 - AI 的奇妙工作面試</title>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 80%;
            max-width: 900px;
            background-color: #fff;
            border: 3px solid #000;
            box-shadow: 10px 10px 0px #000;
            padding: 20px;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            border-bottom: 5px dashed #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        .comic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            border: 3px solid #555;
            padding: 20px;
            background: 
                linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%),
                linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%) 10px 10px;
            background-size: 20px 20px;
            background-color: #ffffff;
        }
        .panel {
            border: 4px solid #000;
            background-color: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transform: rotate(0deg);
            transition: transform 0.3s ease-in-out;
        }
        .panel:nth-child(1) { transform: rotate(-1.5deg); }
        .panel:nth-child(2) { transform: rotate(1deg); }
        .panel:nth-child(3) { transform: rotate(2deg); }
        .panel:nth-child(4) { transform: rotate(-1deg); }
        .panel:hover {
            transform: rotate(0deg) scale(1.05);
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .panel img {
            width: 100%;
            height: auto;
            border: 2px solid #333;
        }
        .dialogue-box {
            background-color: rgba(255, 255, 255, 0.95);
            border: 3px solid #000;
            border-radius: 15px;
            padding: 12px;
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            position: relative;
            box-shadow: 5px 5px 0px #888;
        }
        .dialogue-box::after {
            content: '';
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px;
            border-style: solid;
            border-color: #000 transparent transparent transparent;
        }
        .panel:nth-child(2) .dialogue-box::after, .panel:nth-child(4) .dialogue-box::after {
            border-color: #000 transparent transparent transparent;
        }
        .character-name {
            font-weight: 900;
            margin-bottom: 5px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>【PyClaw 熱血新作】AI 的奇妙工作面試</h1>
        <div class="comic-grid">
            <!-- Panel 1 -->
            <div class="panel">
                <div class="dialogue-box">
                    <div class="character-name">阿宅 (內心)</div>
                    <p>好、好緊張...！聽說這家公司的面試官，是個超高效的 AI！</p>
                </div>
                <img src="/workspace/panel_1.png" alt="第一格：阿宅緊張面試">
            </div>
            <!-- Panel 2 -->
            <div class="panel">
                 <div class="dialogue-box">
                    <div class="character-name">小聰 (AI)</div>
                    <p>你好，我是面試官小聰。第一個問題：請闡述馮·諾伊曼架構與哈佛架構的根本性差異。</p>
                </div>
                <img src="/workspace/panel_2.png" alt="第二格：AI 面試官小聰">
            </div>
            <!-- Panel 3 -->
            <div class="panel">
                 <div class="dialogue-box">
                    <div class="character-name">阿宅</div>
                    <p>（瞳孔地震）呃...那個...就是...一個是把程式和數據...放在...咦？咦咦咦？！</p>
                </div>
                <img src="/workspace/panel_3.png" alt="第三格：阿宅當機">
            </div>
            <!-- Panel 4 -->
            <div class="panel">
                <div class="dialogue-box">
                    <div class="character-name">小聰 (AI)</div>
                    <p>...了解。人類的緩衝區溢位現場，數據已記錄。下一位。</p>
                </div>
                <img src="/workspace/panel_4.png" alt="第四格：AI 表示無奈">
            </div>
        </div>
    </div>
</body>
</html>
